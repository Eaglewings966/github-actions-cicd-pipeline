# Docker Compose Configuration
# Author: Emmanuel Ubani - Cloud & DevOps Engineer

services:
  # Application Service
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: emmanuel-cicd-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - APP_VERSION=1.0.0
    volumes:
      - ../app:/app
      - /app/node_modules
    depends_on:
      - redis
    networks:
      - emmanuel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: emmanuel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - emmanuel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: emmanuel-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../scripts/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - emmanuel-network
    restart: unless-stopped

networks:
  emmanuel-network:
    driver: bridge

volumes:
  redis-data:
    driver: local 
